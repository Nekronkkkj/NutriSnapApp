<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NutriSnap - Registrar</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Registrar</h1>
    <input id="username" type="text" placeholder="Nome de usuário">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <select id="gender">
      <option value="male">Masculino</option>
      <option value="female">Feminino</option>
    </select>
    <input id="height" type="number" placeholder="Altura (cm)">
    <input id="weight" type="number" placeholder="Peso (kg)">
    <button onclick="registerUser()">Registrar</button>
    <p>Já tem conta? <a href="login.html">Login</a></p>
  </div>
  <script src="frontend.js"></script>
  <script>
    async function registerUser(){
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const gender = document.getElementById("gender").value;
      const height = document.getElementById("height").value;
      const weight = document.getElementById("weight").value;
      const deviceKey = "device1";
      const currentIP = "192.168.0.1";

      const res = await fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username,email,password,gender,height_cm:height,weight_kg:weight,deviceKey,currentIP})
      });
      const data = await res.json();
      alert(data.message);
      if(data.message.includes("sucesso")) window.location.href="login.html";
    }
  </script>
</body>
</html>
