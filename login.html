<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NutriSnap - Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <input id="email" type="text" placeholder="Email ou Usuário">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="loginUser()">Entrar</button>
    <p>Não tem conta? <a href="register.html">Registrar</a></p>
  </div>
  <script src="frontend.js"></script>
  <script>
    async function loginUser(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const deviceKey = "device1";
      const currentIP = "192.168.0.1";
      const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({emailOrUsername:email,password,deviceKey,currentIP})
      });
      const data = await res.json();
      alert(data.message);
      if(data.message.includes("bem-sucedido")) window.location.href="dashboard.html";
    }
  </script>
</body>
</html>
